<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>IEEE Page Text Saver</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>IEEE Text Saver</h1>

      <div class="buttons">
        <button id="addPage">Add this page content (i)</button>
        <button id="exportList">Export saved pages</button>
        <button id="resetList" class="danger">Reset</button>
      </div>

      <p id="status"></p>
      <p id="count"></p>
      <ul id="preview"></ul>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
