<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Website Text Saver</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Website Text Saver</h1>

      <label class="toggle-row" for="pasteCaptureToggle">
        <input id="pasteCaptureToggle" type="checkbox" />
        Capture clipboard text on Ctrl+V
      </label>

      <div class="buttons">
        <button id="addPage">Add this page content (i)</button>
        <button id="exportList">Export saved pages</button>
        <button id="resetList" class="danger">Reset</button>
      </div>

      <p id="status"></p>
      <p id="count"></p>
      <ul id="preview"></ul>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
